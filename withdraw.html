<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AfriTrailer - Withdraw</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .quick-amounts {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px 0;
        }
        .quick-amount-btn {
            padding: 10px 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
        .quick-amount-btn:hover {
            background: var(--primary-orange);
            color: white;
        }
        .commission-display {
            background: #E8F5E9;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 600px;">
        <div class="header">
            <h1><i class="fas fa-download"></i> Withdraw Funds</h1>
        </div>
        <div class="card">
            <div class="input-group">
                <label>Amount (UGX)</label>
                <input type="number" id="withdrawAmount" class="amount-input" placeholder="Enter amount" min="4000">
            </div>
            <div class="quick-amounts">
                <button class="quick-amount-btn" onclick="setAmount(5000)">5,000</button>
                <button class="quick-amount-btn" onclick="setAmount(10000)">10,000</button>
                <button class="quick-amount-btn" onclick="setAmount(20000)">20,000</button>
                <button class="quick-amount-btn" onclick="setAmount(50000)">50,000</button>
                <button class="quick-amount-btn" onclick="setHalf()">50%</button>
                <button class="quick-amount-btn" onclick="setMax()">MAX</button>
            </div>
            <div class="commission-display" id="commissionDisplay">
                <p>Commission (10%): <span id="commissionAmount">UGX 0</span></p>
                <p>Network fee: UGX 500</p>
                <p><strong>You receive: <span id="netAmount">UGX 0</span></strong></p>
            </div>
            <button id="confirmWithdraw" class="btn" style="width:100%;">Confirm Withdrawal</button>
            <a href="profile.html" class="back-button" style="display:block; text-align:center; margin-top:20px;">Back to Profile</a>
        </div>
    </div>
    <script type="module">
        import { supabase } from './supabase.js';
        import { getCurrentUser } from './auth.js';

        let currentBalance = 0;

        async function loadBalance() {
            const { data: { user } } = await getCurrentUser();
            if (!user) return;
            const { data: profile } = await supabase
                .from('profiles')
                .select('balance')
                .eq('id', user.id)
                .single();
            if (profile) currentBalance = profile.balance;
        }
        loadBalance();

        window.setAmount = function(amount) {
            document.getElementById('withdrawAmount').value = amount;
            updateCommission();
        };

        window.setHalf = function() {
            setAmount(Math.floor(currentBalance / 2));
        };

        window.setMax = function() {
            setAmount(currentBalance);
        };

        function updateCommission() {
            const amount = parseFloat(document.getElementById('withdrawAmount').value) || 0;
            if (amount >= 4000) {
                const commission = amount * 0.1;
                const net = amount - commission - 500;
                document.getElementById('commissionAmount').textContent = 'UGX ' + commission.toLocaleString();
                document.getElementById('netAmount').textContent = 'UGX ' + net.toLocaleString();
                document.getElementById('commissionDisplay').style.display = 'block';
            } else {
                document.getElementById('commissionDisplay').style.display = 'none';
            }
        }

        document.getElementById('withdrawAmount').addEventListener('input', updateCommission);

        document.getElementById('confirmWithdraw').addEventListener('click', async () => {
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            if (!amount || amount < 4000) {
                alert('Minimum withdrawal is UGX 4,000');
                return;
            }
            if (amount > currentBalance) {
                alert('Insufficient balance');
                return;
            }

            const commission = amount * 0.1;
            const net = amount - commission - 500;

            try {
                const { data: { user }, error: userError } = await getCurrentUser();
                if (userError || !user) throw new Error('Not logged in');

                const { data: profile, error: profileError } = await supabase
                    .from('profiles')
                    .select('phone, balance')
                    .eq('id', user.id)
                    .single();
                if (profileError) throw profileError;

                const newBalance = profile.balance - amount;
                const { error: updateError } = await supabase
                    .from('profiles')
                    .update({ balance: newBalance })
                    .eq('id', user.id);
                if (updateError) throw updateError;

                const { error: insertError } = await supabase
                    .from('payment_requests')
                    .insert({
                        user_id: user.id,
                        type: 'withdrawal',
                        amount: amount,
                        phone: profile.phone
                    });
                if (insertError) throw insertError;

                await fetch('https://discord.com/api/webhooks/1476251245294653542/Lj6t5DXs_k-gWdZDBkFh-CoeJPAbqWsi_PsxQbw5fwMZBhKqIviJCLZerO_r9mYAPiKn', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: `💸 Withdrawal Request!\nPhone: ${profile.phone}\nAmount: UGX ${amount}\nNet after fees: UGX ${net}`
                    })
                });

                alert('Payment will be processed in 4-48 hours');
                window.location.href = 'profile.html';
            } catch (err) {
                console.error(err);
                alert('Error: ' + err.message);
            }
        });
    </script>
</body>
</html>
