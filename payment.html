<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AfriTrailer - Payment</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container" style="max-width: 600px;">
        <div class="header">
            <h1><i class="fas fa-credit-card"></i> Complete Payment</h1>
        </div>
        <div class="card">
            <p>Amount: <strong id="paymentAmount"></strong></p>
            <p>Click on <strong>I have completed payment</strong> to complete the transaction</p>
            <button id="confirmPayment" class="btn" style="width:100%;">I have completed payment</button>
            <a href="home.html" class="back-button" style="display:block; text-align:center; margin-top:20px;">Back to Home</a>
        </div>
    </div>
    <script type="module">
        import { supabase } from './supabase.js';
        import { getCurrentUser } from './auth.js';

        const TIER_COSTS = {
            'A1': 30000,
            'A2': 90000,
            'A3': 210000,
            'A4': 690000
        };

        const pending = JSON.parse(localStorage.getItem('pendingPayment'));
        if (!pending) {
            alert('No pending payment found.');
            window.location.href = 'home.html';
        }

        document.getElementById('paymentAmount').textContent = 'UGX ' + (pending.price || pending.amount).toLocaleString();

        document.getElementById('confirmPayment').addEventListener('click', async () => {
            try {
                const { data: { user }, error: userError } = await getCurrentUser();
                if (userError || !user) throw new Error('Not logged in');

                // Get user's profile
                const { data: profile, error: profileError } = await supabase
                    .from('profiles')
                    .select('phone, balance, tier')
                    .eq('id', user.id)
                    .single();
                if (profileError) throw profileError;

                // Handle tier upgrade with auto-deduction
                if (pending.type === 'tier_upgrade') {
                    const tierCost = TIER_COSTS[pending.tier];

                    // Check if balance is sufficient
                    if (profile.balance < tierCost) {
                        alert('Error, Insufficient funds');
                        return;
                    }

                    const newBalance = profile.balance - tierCost;

                    // Deduct balance and upgrade tier
                    const { error: updateError } = await supabase
                        .from('profiles')
                        .update({ 
                            balance: newBalance,
                            tier: pending.tier,
                            daily_limit: pending.tier === 'A1' ? 5 
                                       : pending.tier === 'A2' ? 10 
                                       : pending.tier === 'A3' ? 14 
                                       : pending.tier === 'A4' ? 20 : 0
                        })
                        .eq('id', user.id);
                    if (updateError) throw updateError;

                    // Insert payment request record
                    const { error: insertError } = await supabase
                        .from('payment_requests')
                        .insert({
                            user_id: user.id,
                            type: pending.type,
                            amount: tierCost,
                            tier: pending.tier,
                            phone: profile.phone,
                            status: 'approved'
                        });
                    if (insertError) throw insertError;

                    // Notify Discord
                    await fetch('https://discord.com/api/webhooks/1475457938297589782/fR9WGn0D8_Lt6GHxDFWDVIb8RKOLBhJWdgbiGXcfCh_V3NtPddtZix101msEpH8ldOcR', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            content: `✅ Auto-Approved Tier Upgrade!\nPhone: ${profile.phone}\nTier: ${pending.tier}\nAmount Deducted: UGX ${tierCost.toLocaleString()}\nNew Balance: UGX ${newBalance.toLocaleString()}`
                        })
                    });

                    alert(`Success! You have been upgraded to ${pending.tier} tier.`);

                } else {
                    // For non-tier-upgrade payments, just insert request and notify Discord
                    const { error: insertError } = await supabase
                        .from('payment_requests')
                        .insert({
                            user_id: user.id,
                            type: pending.type,
                            amount: pending.price || pending.amount,
                            tier: pending.tier || null,
                            phone: profile.phone,
                            status: 'pending'
                        });
                    if (insertError) throw insertError;

                    await fetch('https://discord.com/api/webhooks/1475457938297589782/fR9WGn0D8_Lt6GHxDFWDVIb8RKOLBhJWdgbiGXcfCh_V3NtPddtZix101msEpH8ldOcR', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            content: `💰 New Payment Request!\nPhone: ${profile.phone}\nAmount: UGX ${(pending.price || pending.amount).toLocaleString()}\nType: ${pending.type}${pending.tier ? '\nTier: ' + pending.tier : ''}`
                        })
                    });

                    alert('Thank you for your payment. It will be confirmed shortly.');
                }

                localStorage.removeItem('pendingPayment');
                window.location.href = 'home.html';

            } catch (err) {
                console.error(err);
                alert('Error: ' + err.message);
            }
        });
    </script>
</body>
</html>
