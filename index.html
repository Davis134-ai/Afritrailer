<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AfriTrailer - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container" style="max-width: 400px;">
        <div class="header">
            <h1><i class="fas fa-film"></i> AfriTrailer</h1>
            <p>Login to continue</p>
        </div>
        <div class="card">
            <form id="loginForm">
                <div class="input-group">
                    <label for="phone">Phone Number (Uganda)</label>
                    <div style="display: flex;">
                        <span style="background: #f0f0f0; padding: 15px; border-radius: var(--radius) 0 0 var(--radius); border: 2px solid #ddd; border-right: none;">+256</span>
                        <input type="tel" id="phone" placeholder="701234567" style="flex:1; border-radius: 0 var(--radius) var(--radius) 0;" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn" style="width:100%;">Login</button>
            </form>
            <p style="text-align:center; margin-top:20px;">Don't have an account? <a href="register.html">Register</a></p>
        </div>
    </div>
    <script type="module">
        import { login } from './auth.js'
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault()
            const phone = '+256' + document.getElementById('phone').value.replace(/\D/g,'')
            const password = document.getElementById('password').value
            try {
                await login(phone, password)
                window.location.href = 'home.html'
            } catch (err) {
                alert('Login failed: ' + err.message)
            }
        })
    </script>
</body>
</html>
